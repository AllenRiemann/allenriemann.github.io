<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>AZ Tetris Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto}
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:5px 5px 0;
  height:100vh;
  overflow:hidden;
}
.game{
  width:100%;
  max-width:310px;
  background:#1c1c1e;
  border-radius:12px;
  padding:8px;
}
/* 顶部标题+分数容器 */
.game-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:100%;
  margin-bottom:4px;
  line-height:1;
}
.game-title{
  color:white;
  font-size:16px;
  font-weight:600;
}
.score{
  color:white;
  font-size:14px;
}
/* 游戏棋盘容器：保证网格为正方形 */
#board-container {
  width: 100%;
  /* 关键：宽度决定高度，保证1:1比例的基础 */
  position: relative;
  margin-bottom:4px;
}
/* 游戏棋盘：严格正方形网格 */
#board{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(20,1fr); /* 显式定义20行，每行1fr */
  gap:1px; /* 网格线宽度 */
  background:#444; /* 网格线颜色 */
  width: 100%;
  /* 核心：强制宽高比为10:20（即1:2），保证每个格子是正方形 */
  aspect-ratio: 10/20; 
  border:1px solid #444; /* 棋盘外边框 */
}
/* 每个格子：严格正方形 */
.cell{
  background:#3a3a3c; /* 格子背景色 */
  border-radius:1px;
  /* 强制每个格子宽高相等（正方形） */
  aspect-ratio: 1/1;
  width: 100%;
}
/* 方块颜色 */
.cell.I{background:#4cc9f0}
.cell.J{background:#4361ee}
.cell.L{background:#f77f00}
.cell.O{background:#fee440}
.cell.S{background:#06d6a0}
.cell.T{background:#7209b7}
.cell.Z{background:#f72585}
/* 控制按钮区域 */
.ctrl{
  width:100%;
}
.btn-row-1, .btn-row-2 {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:4px;
  margin-bottom:4px;
}
/* 按钮样式 */
button{
  padding:6px 0;
  font-size:14px;
  border:none;
  border-radius:6px;
  background:#007aff;
  color:white;
  width:100%;
  max-width:60px;
  margin:0 auto;
  cursor:pointer;
  line-height:1;
  -webkit-tap-highlight-color: transparent; /* 消除iOS点击高亮 */
  user-select: none; /* 防止长按选中文字，干扰事件 */
}
button:active{opacity:0.7}
#reset{background:#ff3b30}
#pause{background:#f59e0b}
#resume{background:#10b981;display:none}
/* 游戏结束提示 */
#over{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.85);
  color:white;
  padding:15px 20px;
  border-radius:10px;
  font-size:18px;
  display:none;
  z-index:10;
}
</style>
</head>
<body>
<div class="game">
  <div class="game-header">
    <div class="game-title">AZ Tetris Game</div>
    <div class="score">Score: <span id="score">0</span></div>
  </div>

  <!-- 新增棋盘容器，保证正方形网格 -->
  <div id="board-container">
    <div id="board"></div>
  </div>

  <div class="ctrl">
    <div class="btn-row-1">
      <button onclick="left()">←</button>
      <button onclick="rotate()">↻</button>
      <button onclick="right()">→</button>
    </div>
    <div class="btn-row-2">
      <button onclick="start()" id="reset">Reset</button>
      <!-- 修复长按事件绑定，增加点击单次下落 -->
      <button id="downBtn" 
        onclick="down()" 
        ontouchstart="handleTouchStart()" 
        ontouchend="handleTouchEnd()" 
        ontouchcancel="handleTouchEnd()">↓</button>
      <button onclick="togglePause()" id="pause">⏸️</button>
      <button onclick="togglePause()" id="resume">▶️</button>
    </div>
  </div>
</div>

<div id="over"> Game over!<br>Score：<span id="final"></span></div>

<script>
// 游戏核心常量
const COLS=10, ROWS=20;
let board, score, fallInterval, fastFallInterval; // 新增快速下落定时器
let currentPiece, currentX, currentY;
let isRunning = false, isPaused = false;
let normalFallSpeed = 800; // 正常下落速度（毫秒）
let fastFallSpeed = 80;    // 加速下落速度（调快，体验更好）
let touchTimer = null;     // 长按检测定时器

// 7种方块形状
const SHAPES = [
  [[1,1,1,1]],          // I
  [[1,0,0],[1,1,1]],    // J
  [[0,0,1],[1,1,1]],    // L
  [[1,1],[1,1]],        // O
  [[0,1,1],[1,1,0]],    // S
  [[0,1,0],[1,1,1]],    // T
  [[1,1,0],[0,1,1]]     // Z
];
const COLOR_CLASSES = ['I','J','L','O','S','T','Z'];

// 初始化游戏棋盘
function initBoard() {
  board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  
  // 生成10x20的正方形格子
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.x = x;
      cell.dataset.y = y;
      boardEl.appendChild(cell);
    }
  }
}

// 生成随机方块
function generateRandomPiece() {
  const shapeIndex = Math.floor(Math.random() * SHAPES.length);
  const shape = SHAPES[shapeIndex];
  const color = COLOR_CLASSES[shapeIndex];
  
  // 初始位置：顶部居中
  currentX = Math.floor(COLS / 2) - Math.floor(shape[0].length / 2);
  currentY = 0;
  
  return { shape, color };
}

// 检查位置是否有效（不越界、不重叠）
function isValidPosition(shape, offsetX = 0, offsetY = 0) {
  for (let y = 0; y < shape.length; y++) {
    for (let x = 0; x < shape[y].length; x++) {
      if (shape[y][x]) {
        const newX = currentX + x + offsetX;
        const newY = currentY + y + offsetY;
        
        // 检查边界
        if (newX < 0 || newX >= COLS || newY >= ROWS) return false;
        // 检查是否与已有方块重叠（忽略顶部越界）
        if (newY >= 0 && board[newY][newX]) return false;
      }
    }
  }
  return true;
}

// 绘制游戏画面
function draw() {
  // 清空所有格子样式
  document.querySelectorAll('.cell').forEach(cell => cell.className = 'cell');
  
  // 绘制已固定的方块
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (board[y][x]) {
        const cell = document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
        cell.classList.add(board[y][x]);
      }
    }
  }
  
  // 绘制当前移动的方块
  if (currentPiece) {
    const { shape, color } = currentPiece;
    for (let y = 0; y < shape.length; y++) {
      for (let x = 0; x < shape[y].length; x++) {
        if (shape[y][x]) {
          const drawX = currentX + x;
          const drawY = currentY + y;
          if (drawY >= 0) { // 只绘制可见区域
            const cell = document.querySelector(`.cell[data-x="${drawX}"][data-y="${drawY}"]`);
            cell.classList.add(color);
          }
        }
      }
    }
  }
}

// 固定当前方块到棋盘
function lockPiece() {
  const { shape, color } = currentPiece;
  for (let y = 0; y < shape.length; y++) {
    for (let x = 0; x < shape[y].length; x++) {
      if (shape[y][x]) {
        const newY = currentY + y;
        const newX = currentX + x;
        if (newY >= 0) board[newY][newX] = color;
      }
    }
  }
  
  // 消除满行
  clearLines();
  
  // 生成新方块
  currentPiece = generateRandomPiece();
  
  // 检查游戏是否结束
  if (!isValidPosition(currentPiece.shape)) {
    gameOver();
  }
}

// 消除满行并更新分数
function clearLines() {
  let linesCleared = 0;
  
  for (let y = ROWS - 1; y >= 0; y--) {
    if (board[y].every(cell => cell !== 0)) {
      linesCleared++;
      
      // 移除当前行，上方行下移
      for (let i = y; i > 0; i--) {
        board[i] = [...board[i-1]];
      }
      // 顶部新增空行
      board[0] = Array(COLS).fill(0);
      
      // 重新检查当前行（因为行下移了）
      y++;
    }
  }
  
  // 分数规则：1行100，2行300，3行500，4行800
  const scoreMap = [0, 100, 300, 500, 800];
  score += scoreMap[linesCleared];
  document.getElementById('score').textContent = score;
}

// 基础控制函数
function left() {
  if (isRunning && !isPaused && isValidPosition(currentPiece.shape, -1, 0)) {
    currentX--;
    draw();
  }
}

function right() {
  if (isRunning && !isPaused && isValidPosition(currentPiece.shape, 1, 0)) {
    currentX++;
    draw();
  }
}

// 下落核心函数（通用）
function down() {
  if (!isRunning || isPaused) return;
  
  if (isValidPosition(currentPiece.shape, 0, 1)) {
    currentY++;
    draw();
  } else {
    lockPiece();
  }
}

function rotate() {
  if (!isRunning || isPaused) return;
  
  // 顺时针旋转90度
  const rotated = currentPiece.shape[0].map((_, index) => 
    currentPiece.shape.map(row => row[index]).reverse()
  );
  
  if (isValidPosition(rotated)) {
    currentPiece.shape = rotated;
    draw();
  }
}

// ========== 修复核心：长按加速逻辑 ==========
// 触摸开始：延迟启动加速（区分点击和长按）
function handleTouchStart() {
  if (!isRunning || isPaused) return;
  // 300ms后判定为长按，启动加速（避免点击时误触发）
  touchTimer = setTimeout(() => {
    clearInterval(fallInterval); // 停止正常下落
    fastFallInterval = setInterval(down, fastFallSpeed); // 启动加速
    down(); // 立即下落一次，提升响应
  }, 300);
}

// 触摸结束/取消：停止加速，恢复正常
function handleTouchEnd() {
  if (!isRunning || isPaused) return;
  // 清除长按检测定时器（未到300ms则取消）
  clearTimeout(touchTimer);
  // 停止加速定时器
  clearInterval(fastFallInterval);
  // 重启正常下落
  if (isRunning && !isPaused) {
    fallInterval = setInterval(down, normalFallSpeed);
  }
}

// 暂停/继续切换
function togglePause() {
  if (!isRunning) return;
  
  isPaused = !isPaused;
  const pauseBtn = document.getElementById('pause');
  const resumeBtn = document.getElementById('resume');
  
  if (isPaused) {
    // 暂停：停止所有定时器
    clearInterval(fallInterval);
    clearInterval(fastFallInterval);
    clearTimeout(touchTimer); // 同时清除长按检测定时器
    pauseBtn.style.display = 'none';
    resumeBtn.style.display = 'block';
  } else {
    // 继续：重启正常下落
    fallInterval = setInterval(down, normalFallSpeed);
    pauseBtn.style.display = 'block';
    resumeBtn.style.display = 'none';
    draw();
  }
}

// 游戏结束
function gameOver() {
  isRunning = false;
  // 清除所有定时器
  clearInterval(fallInterval);
  clearInterval(fastFallInterval);
  clearTimeout(touchTimer); // 清除长按检测定时器
  document.getElementById('final').textContent = score;
  document.getElementById('over').style.display = 'block';
  
  // 重置暂停按钮状态
  document.getElementById('pause').style.display = 'block';
  document.getElementById('resume').style.display = 'none';
  isPaused = false;
}

// 开始/重置游戏
function start() {
  // 清除旧的定时器
  clearInterval(fallInterval);
  clearInterval(fastFallInterval);
  clearTimeout(touchTimer); // 清除长按检测定时器
  
  // 重置游戏状态
  score = 0;
  isRunning = true;
  isPaused = false;
  
  // 更新UI
  document.getElementById('score').textContent = 0;
  document.getElementById('over').style.display = 'none';
  document.getElementById('pause').style.display = 'block';
  document.getElementById('resume').style.display = 'none';
  
  // 初始化棋盘和方块
  initBoard();
  currentPiece = generateRandomPiece();
  
  // 启动正常自动下落
  fallInterval = setInterval(down, normalFallSpeed);
  
  // 绘制初始画面
  draw();
}

// 键盘控制（电脑端）
document.addEventListener('keydown', (e) => {
  if (!isRunning || isPaused) return;
  
  switch(e.key) {
    case 'ArrowLeft': left(); break;
    case 'ArrowRight': right(); break;
    case 'ArrowDown': 
      // 电脑端按住下箭头也加速
      clearInterval(fallInterval);
      fastFallInterval = setInterval(down, fastFallSpeed);
      down();
      break;
    case 'ArrowUp': rotate(); break;
    case ' ': togglePause(); e.preventDefault(); break; // 空格暂停
  }
});

// 电脑端松开下箭头恢复正常下落
document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowDown') {
    clearInterval(fastFallInterval);
    if (isRunning && !isPaused) {
      fallInterval = setInterval(down, normalFallSpeed);
    }
  }
});

// 页面加载后自动开始游戏
window.addEventListener('load', start);
</script>
</body>
</html>
