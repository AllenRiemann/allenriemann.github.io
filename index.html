<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>AZ Tetris Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto}
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:flex-start; /* 顶部对齐避免溢出 */
  min-height:100vh;
  padding:8px 8px 0; /* 最小化内边距 */
  height:100vh; /* 强制body占满视口 */
  overflow:hidden; /* 隐藏滚动 */
}
.game{
  width:100%;
  max-width:320px; /* 缩小游戏主体宽度（适配iPhone 17） */
  background:#1c1c1e;
  border-radius:16px; /* 缩小圆角 */
  padding:12px; /* 减少内边距 */
}
/* 顶部标题+分数容器 */
.game-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:100%;
  margin-bottom:8px; /* 缩小间距 */
}
.game-title{
  color:white;
  font-size:18px; /* 缩小标题字体 */
  font-weight:600;
}
.score{
  color:white;
  font-size:16px; /* 缩小分数字体 */
}
/* 游戏棋盘：核心缩小尺寸 */
#board{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  gap:0.5px; /* 最小化格子间距 */
  background:#2c2c2e;
  width:100%;
  aspect-ratio: 10/19; /* 略微压缩棋盘比例（原10/20） */
  margin-bottom:8px; /* 缩小间距 */
}
.cell{
  background:#3a3a3c;
  border-radius:1px; /* 缩小格子圆角 */
}
/* 方块颜色 */
.cell.I{background:#4cc9f0}
.cell.J{background:#4361ee}
.cell.L{background:#f77f00}
.cell.O{background:#fee440}
.cell.S{background:#06d6a0}
.cell.T{background:#7209b7}
.cell.Z{background:#f72585}
/* 控制按钮区域 */
.ctrl{
  width:100%;
}
.btn-row-1, .btn-row-2 {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:6px; /* 缩小按钮间距 */
  margin-bottom:6px; /* 缩小间距 */
}
/* 更窄的按钮样式 */
button{
  padding:8px 0; /* 大幅减少内边距（更窄） */
  font-size:16px; /* 缩小按钮字体 */
  border:none;
  border-radius:8px; /* 缩小按钮圆角 */
  background:#007aff;
  color:white;
  width:100%;
  max-width:65px; /* 进一步缩小按钮最大宽度 */
  margin:0 auto;
  cursor:pointer;
}
button:active{opacity:0.7}
#reset{background:#ff3b30}
#pause{background:#f59e0b}
#resume{background:#10b981;display:none}
/* 游戏结束提示（缩小尺寸） */
#over{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.85);
  color:white;
  padding:20px 25px; /* 缩小提示框内边距 */
  border-radius:12px;
  font-size:20px; /* 缩小提示字体 */
  display:none;
  z-index:10;
}
</style>
</head>
<body>
<div class="game">
  <div class="game-header">
    <div class="game-title">AZ Tetris Game</div>
    <div class="score">Score: <span id="score">0</span></div>
  </div>

  <div id="board"></div>

  <div class="ctrl">
    <div class="btn-row-1">
      <button onclick="left()">←</button>
      <button onclick="rotate()">↻</button>
      <button onclick="right()">→</button>
    </div>
    <div class="btn-row-2">
      <button onclick="start()" id="reset">Reset</button>
      <button onclick="down()" id="down">↓</button>
      <button onclick="togglePause()" id="pause">⏸️</button>
      <button onclick="togglePause()" id="resume">▶️</button>
    </div>
  </div>
</div>

<div id="over"> Game over!<br>Score：<span id="final"></span></div>

<script>
// 游戏核心常量
const COLS=10, ROWS=20;
let board, score, fallInterval, currentPiece, currentX, currentY;
let isRunning = false, isPaused = false;

// 7种方块形状
const SHAPES = [
  [[1,1,1,1]],          // I
  [[1,0,0],[1,1,1]],    // J
  [[0,0,1],[1,1,1]],    // L
  [[1,1],[1,1]],        // O
  [[0,1,1],[1,1,0]],    // S
  [[0,1,0],[1,1,1]],    // T
  [[1,1,0],[0,1,1]]     // Z
];
const COLOR_CLASSES = ['I','J','L','O','S','T','Z'];

// 初始化游戏棋盘
function initBoard() {
  board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  
  // 生成10x20的格子
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.x = x;
      cell.dataset.y = y;
      boardEl.appendChild(cell);
    }
  }
}

// 生成随机方块
function generateRandomPiece() {
  const shapeIndex = Math.floor(Math.random() * SHAPES.length);
  const shape = SHAPES[shapeIndex];
  const color = COLOR_CLASSES[shapeIndex];
  
  // 初始位置：顶部居中
  currentX = Math.floor(COLS / 2) - Math.floor(shape[0].length / 2);
  currentY = 0;
  
  return { shape, color };
}

// 检查位置是否有效（不越界、不重叠）
function isValidPosition(shape, offsetX = 0, offsetY = 0) {
  for (let y = 0; y < shape.length; y++) {
    for (let x = 0; x < shape[y].length; x++) {
      if (shape[y][x]) {
        const newX = currentX + x + offsetX;
        const newY = currentY + y + offsetY;
        
        // 检查边界
        if (newX < 0 || newX >= COLS || newY >= ROWS) return false;
        // 检查是否与已有方块重叠（忽略顶部越界）
        if (newY >= 0 && board[newY][newX]) return false;
      }
    }
  }
  return true;
}

// 绘制游戏画面
function draw() {
  // 清空所有格子样式
  document.querySelectorAll('.cell').forEach(cell => cell.className = 'cell');
  
  // 绘制已固定的方块
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (board[y][x]) {
        const cell = document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
        cell.classList.add(board[y][x]);
      }
    }
  }
  
  // 绘制当前移动的方块
  if (currentPiece) {
    const { shape, color } = currentPiece;
    for (let y = 0; y < shape.length; y++) {
      for (let x = 0; x < shape[y].length; x++) {
        if (shape[y][x]) {
          const drawX = currentX + x;
          const drawY = currentY + y;
          if (drawY >= 0) { // 只绘制可见区域
            const cell = document.querySelector(`.cell[data-x="${drawX}"][data-y="${drawY}"]`);
            cell.classList.add(color);
          }
        }
      }
    }
  }
}

// 固定当前方块到棋盘
function lockPiece() {
  const { shape, color } = currentPiece;
  for (let y = 0; y < shape.length; y++) {
    for (let x = 0; x < shape[y].length; x++) {
      if (shape[y][x]) {
        const newY = currentY + y;
        const newX = currentX + x;
        if (newY >= 0) board[newY][newX] = color;
      }
    }
  }
  
  // 消除满行
  clearLines();
  
  // 生成新方块
  currentPiece = generateRandomPiece();
  
  // 检查游戏是否结束
  if (!isValidPosition(currentPiece.shape)) {
    gameOver();
  }
}

// 消除满行并更新分数
function clearLines() {
  let linesCleared = 0;
  
  for (let y = ROWS - 1; y >= 0; y--) {
    if (board[y].every(cell => cell !== 0)) {
      linesCleared++;
      
      // 移除当前行，上方行下移
      for (let i = y; i > 0; i--) {
        board[i] = [...board[i-1]];
      }
      // 顶部新增空行
      board[0] = Array(COLS).fill(0);
      
      // 重新检查当前行（因为行下移了）
      y++;
    }
  }
  
  // 分数规则：1行100，2行300，3行500，4行800
  const scoreMap = [0, 100, 300, 500, 800];
  score += scoreMap[linesCleared];
  document.getElementById('score').textContent = score;
}

// 控制函数
function left() {
  if (isRunning && !isPaused && isValidPosition(currentPiece.shape, -1, 0)) {
    currentX--;
    draw();
  }
}

function right() {
  if (isRunning && !isPaused && isValidPosition(currentPiece.shape, 1, 0)) {
    currentX++;
    draw();
  }
}

function down() {
  if (!isRunning || isPaused) return;
  
  if (isValidPosition(currentPiece.shape, 0, 1)) {
    currentY++;
    draw();
  } else {
    lockPiece();
  }
}

function rotate() {
  if (!isRunning || isPaused) return;
  
  // 顺时针旋转90度
  const rotated = currentPiece.shape[0].map((_, index) => 
    currentPiece.shape.map(row => row[index]).reverse()
  );
  
  if (isValidPosition(rotated)) {
    currentPiece.shape = rotated;
    draw();
  }
}

// 暂停/继续切换
function togglePause() {
  if (!isRunning) return;
  
  isPaused = !isPaused;
  const pauseBtn = document.getElementById('pause');
  const resumeBtn = document.getElementById('resume');
  
  if (isPaused) {
    // 暂停：停止自动下落
    clearInterval(fallInterval);
    pauseBtn.style.display = 'none';
    resumeBtn.style.display = 'block';
  } else {
    // 继续：重启自动下落
    fallInterval = setInterval(down, 800);
    pauseBtn.style.display = 'block';
    resumeBtn.style.display = 'none';
    draw();
  }
}

// 游戏结束
function gameOver() {
  isRunning = false;
  clearInterval(fallInterval);
  document.getElementById('final').textContent = score;
  document.getElementById('over').style.display = 'block';
  
  // 重置暂停按钮状态
  document.getElementById('pause').style.display = 'block';
  document.getElementById('resume').style.display = 'none';
  isPaused = false;
}

// 开始/重置游戏
function start() {
  // 清除旧的定时器
  clearInterval(fallInterval);
  
  // 重置游戏状态
  score = 0;
  isRunning = true;
  isPaused = false;
  
  // 更新UI
  document.getElementById('score').textContent = 0;
  document.getElementById('over').style.display = 'none';
  document.getElementById('pause').style.display = 'block';
  document.getElementById('resume').style.display = 'none';
  
  // 初始化棋盘和方块
  initBoard();
  currentPiece = generateRandomPiece();
  
  // 启动自动下落
  fallInterval = setInterval(down, 800);
  
  // 绘制初始画面
  draw();
}

// 键盘控制（电脑端）
document.addEventListener('keydown', (e) => {
  if (!isRunning || isPaused) return;
  
  switch(e.key) {
    case 'ArrowLeft': left(); break;
    case 'ArrowRight': right(); break;
    case 'ArrowDown': down(); break;
    case 'ArrowUp': rotate(); break;
    case ' ': togglePause(); e.preventDefault(); break; // 空格暂停
  }
});

// 页面加载后自动开始游戏
window.addEventListener('load', start);
</script>
</body>
</html>
