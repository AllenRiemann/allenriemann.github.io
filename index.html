<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<!-- 新增viewport适配微信浏览器 -->
<meta name="viewport" content="width=device-width, initial-scale=0.9, user-scalable=no">
<title>AZ Tetris Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto}
body{
  background:#111;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  min-height:100vh;
  padding:3px 3px 0; /* 极致缩小页面内边距 */
  height:100vh;
  overflow:hidden;
}
/* 整体游戏容器进一步缩小 */
.game{
  width:100%;
  max-width:280px; /* 从310px→280px，核心缩小 */
  background:#1c1c1e;
  border-radius:10px; /* 缩小圆角 */
  padding:6px; /* 缩小内边距 */
}
/* 顶部标题+分数容器 */
.game-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:100%;
  margin-bottom:3px; /* 缩小间距 */
  line-height:1;
}
.game-title{
  color:white;
  font-size:14px; /* 缩小字体 */
  font-weight:600;
}
.score{
  color:white;
  font-size:12px; /* 缩小字体 */
}
/* 游戏棋盘容器 */
#board-container {
  width: 100%;
  position: relative;
  margin-bottom:3px; /* 缩小间距 */
}
/* 正方形网格棋盘（同步缩小比例） */
#board{
  display:grid;
  grid-template-columns:repeat(10,1fr);
  grid-template-rows:repeat(20,1fr);
  gap:1px;
  background:#444;
  width: 100%;
  aspect-ratio: 10/20; 
  border:1px solid #444;
}
/* 正方形格子 */
.cell{
  background:#3a3a3c;
  border-radius:1px;
  aspect-ratio: 1/1;
  width: 100%;
}
/* 方块颜色 */
.cell.I{background:#4cc9f0}
.cell.J{background:#4361ee}
.cell.L{background:#f77f00}
.cell.O{background:#fee440}
.cell.S{background:#06d6a0}
.cell.T{background:#7209b7}
.cell.Z{background:#f72585}
/* 控制按钮区域 */
.ctrl{
  width:100%;
}
.btn-row-1, .btn-row-2 {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:5px; /* 合理间距，适配小按钮 */
  margin-bottom:3px; /* 缩小间距 */
}
/* 按钮尺寸同步缩小（仍保证触摸面积） */
button{
  padding:7px 0; /* 适度调整内边距 */
  font-size:14px; /* 保持字体清晰 */
  border:none;
  border-radius:7px; /* 适配小按钮的圆角 */
  background:#007aff;
  color:white;
  width:100%;
  max-width:62px; /* 从70px→62px，缩小按钮 */
  margin:0 auto;
  cursor:pointer;
  line-height:1;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
button:active{opacity:0.7}
#reset{background:#ff3b30}
#pause{background:#f59e0b}
#resume{background:#10b981;display:none}
/* 游戏结束提示同步缩小 */
#over{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:rgba(0,0,0,0.85);
  color:white;
  padding:12px 18px; /* 缩小内边距 */
  border-radius:8px; /* 缩小圆角 */
  font-size:16px; /* 缩小字体 */
  display:none;
  z-index:10;
}
</style>
</head>
<body>
<div class="game">
  <div class="game-header">
    <div class="game-title">AZ Tetris Game</div>
    <div class="score">Score: <span id="score">0</span></div>
  </div>

  <div id="board-container">
    <div id="board"></div>
  </div>

  <div class="ctrl">
    <div class="btn-row-1">
      <button onclick="left()">←</button>
      <button onclick="rotate()">↻</button>
      <button onclick="right()">→</button>
    </div>
    <div class="btn-row-2">
      <button onclick="start()" id="reset">Reset</button>
      <button id="downBtn" 
        onclick="down()" 
        ontouchstart="handleTouchStart()" 
        ontouchend="handleTouchEnd()" 
        ontouchcancel="handleTouchEnd()">↓</button>
      <button onclick="togglePause()" id="pause">⏸️</button>
      <button onclick="togglePause()" id="resume">▶️</button>
    </div>
  </div>
</div>

<div id="over"> Game over!<br>Score：<span id="final"></span></div>

<script>
// 游戏核心常量
const COLS=10, ROWS=20;
let board, score, fallInterval, fastFallInterval;
let currentPiece, currentX, currentY;
let isRunning = false, isPaused = false;
const normalFallSpeed = 800;
const fastFallSpeed = 80;    
let touchTimer = null;

// 7种方块形状
const SHAPES = [
  [[1,1,1,1]],          // I
  [[1,0,0],[1,1,1]],    // J
  [[0,0,1],[1,1,1]],    // L
  [[1,1],[1,1]],        // O
  [[0,1,1],[1,1,0]],    // S
  [[0,1,0],[1,1,1]],    // T
  [[1,1,0],[0,1,1]]     // Z
];
const COLOR_CLASSES = ['I','J','L','O','S','T','Z'];

// 初始化游戏棋盘
function initBoard() {
  board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.x = x;
      cell.dataset.y = y;
      boardEl.appendChild(cell);
    }
  }
}

// 生成随机方块
function generateRandomPiece() {
  const shapeIndex = Math.floor(Math.random() * SHAPES.length);
  const shape = SHAPES[shapeIndex];
  const color = COLOR_CLASSES[shapeIndex];
  
  currentX = Math.floor(COLS / 2) - Math.floor(shape[0].length / 2);
  currentY = 0;
  
  return { shape, color };
}

// 检查位置是否有效
function isValidPosition(shape, offsetX = 0, offsetY = 0) {
  for (let y = 0; y < shape.length; y++) {
    for (let x = 0; x < shape[y].length; x++) {
      if (shape[y][x]) {
        const newX = currentX + x + offsetX;
        const newY = currentY + y + offsetY;
        
        if (newX < 0 || newX >= COLS || newY >= ROWS) return false;
        if (newY >= 0 && board[newY][newX]) return false;
      }
    }
  }
  return true;
}

// 绘制游戏画面
function draw() {
  document.querySelectorAll('.cell').forEach(cell => cell.className = 'cell');
  
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (board[y][x]) {
        const cell = document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
        cell.classList.add(board[y][x]);
      }
    }
  }
  
  if (currentPiece) {
    const { shape, color } = currentPiece;
    for (let y = 0; y < shape.length; y++) {
      for (let x = 0; x < shape[y].length; x++) {
        if (shape[y][x]) {
          const drawX = currentX + x;
          const drawY = currentY + y;
          if (drawY >= 0) {
            const cell = document.querySelector(`.cell[data-x="${drawX}"][data-y="${drawY}"]`);
            cell.classList.add(color);
          }
        }
      }
    }
  }
}

// 固定当前方块到棋盘
function lockPiece() {
  const { shape, color } = currentPiece;
  for (let y = 0; y < shape.length; y++) {
    for (let x = 0; x < shape[y].length; x++) {
      if (shape[y][x]) {
        const newY = currentY + y;
        const newX = currentX + x;
        if (newY >= 0) board[newY][newX] = color;
      }
    }
  }
  
  clearLines();
  currentPiece = generateRandomPiece();
  
  if (!isValidPosition(currentPiece.shape)) {
    gameOver();
  }
}

// 消除满行并更新分数
function clearLines() {
  let linesCleared = 0;
  
  for (let y = ROWS - 1; y >= 0; y--) {
    if (board[y].every(cell => cell !== 0)) {
      linesCleared++;
      
      for (let i = y; i > 0; i--) {
        board[i] = [...board[i-1]];
      }
      board[0] = Array(COLS).fill(0);
      y++;
    }
  }
  
  const scoreMap = [0, 100, 300, 500, 800];
  score += scoreMap[linesCleared];
  document.getElementById('score').textContent = score;
}

// 基础控制函数
function left() {
  if (isRunning && !isPaused && isValidPosition(currentPiece.shape, -1, 0)) {
    currentX--;
    draw();
  }
}

function right() {
  if (isRunning && !isPaused && isValidPosition(currentPiece.shape, 1, 0)) {
    currentX++;
    draw();
  }
}

// 下落核心函数
function down() {
  if (!isRunning || isPaused) return;
  
  if (isValidPosition(currentPiece.shape, 0, 1)) {
    currentY++;
    draw();
  } else {
    lockPiece();
  }
}

function rotate() {
  if (!isRunning || isPaused) return;
  
  const rotated = currentPiece.shape[0].map((_, index) => 
    currentPiece.shape.map(row => row[index]).reverse()
  );
  
  if (isValidPosition(rotated)) {
    currentPiece.shape = rotated;
    draw();
  }
}

// 长按加速逻辑
function handleTouchStart() {
  if (!isRunning || isPaused) return;
  touchTimer = setTimeout(() => {
    clearInterval(fallInterval);
    fastFallInterval = setInterval(down, fastFallSpeed);
    down();
  }, 300);
}

function handleTouchEnd() {
  if (!isRunning || isPaused) return;
  clearTimeout(touchTimer);
  clearInterval(fastFallInterval);
  if (isRunning && !isPaused) {
    fallInterval = setInterval(down, normalFallSpeed);
  }
}

// 暂停/恢复逻辑
function togglePause() {
  if (!isRunning) return;
  
  isPaused = !isPaused;
  const pauseBtn = document.getElementById('pause');
  const resumeBtn = document.getElementById('resume');
  
  if (isPaused) {
    clearInterval(fallInterval);
    clearInterval(fastFallInterval);
    clearTimeout(touchTimer);
    pauseBtn.style.display = 'none';
    resumeBtn.style.display = 'block';
  } else {
    clearInterval(fastFallInterval);
    fallInterval = setInterval(down, normalFallSpeed);
    pauseBtn.style.display = 'block';
    resumeBtn.style.display = 'none';
    draw();
  }
}

// 游戏结束
function gameOver() {
  isRunning = false;
  clearInterval(fallInterval);
  clearInterval(fastFallInterval);
  clearTimeout(touchTimer);
  document.getElementById('final').textContent = score;
  document.getElementById('over').style.display = 'block';
  
  document.getElementById('pause').style.display = 'block';
  document.getElementById('resume').style.display = 'none';
  isPaused = false;
}

// 重置游戏逻辑
function start() {
  clearInterval(fallInterval);
  clearInterval(fastFallInterval);
  clearTimeout(touchTimer);
  
  score = 0;
  isRunning = true;
  isPaused = false;
  
  document.getElementById('score').textContent = 0;
  document.getElementById('over').style.display = 'none';
  document.getElementById('pause').style.display = 'block';
  document.getElementById('resume').style.display = 'none';
  
  initBoard();
  currentPiece = generateRandomPiece();
  
  fallInterval = setInterval(down, normalFallSpeed);
  
  draw();
}

// 键盘控制（电脑端）
document.addEventListener('keydown', (e) => {
  if (!isRunning || isPaused) return;
  
  switch(e.key) {
    case 'ArrowLeft': left(); break;
    case 'ArrowRight': right(); break;
    case 'ArrowDown': 
      clearInterval(fallInterval);
      fastFallInterval = setInterval(down, fastFallSpeed);
      down();
      break;
    case 'ArrowUp': rotate(); break;
    case ' ': togglePause(); e.preventDefault(); break;
  }
});

// 电脑端松开下箭头恢复正常下落
document.addEventListener('keyup', (e) => {
  if (e.key === 'ArrowDown') {
    clearInterval(fastFallInterval);
    if (isRunning && !isPaused) {
      fallInterval = setInterval(down, normalFallSpeed);
    }
  }
});

// 页面加载后自动开始游戏
window.addEventListener('load', start);
</script>
</body>
</html>
