<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>俄罗斯方块</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        .game-board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 1px;
            background-color: #374151;
            border: 2px solid #1f2937;
            border-radius: 8px;
            overflow: hidden;
        }
        .cell {
            width: 100%;
            aspect-ratio: 1;
            background-color: #1f2937;
            border: 1px solid #374151;
        }
        .cell.filled {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .cell.i { background-color: #00f0f0; }
        .cell.j { background-color: #0000f0; }
        .cell.l { background-color: #f0a000; }
        .cell.o { background-color: #f0f000; }
        .cell.s { background-color: #00f000; }
        .cell.t { background-color: #a000f0; }
        .cell.z { background-color: #f00000; }
        .control-btn {
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        .control-btn:active {
            transform: scale(0.95);
        }
        .next-piece {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background-color: #374151;
            border: 2px solid #1f2937;
            border-radius: 4px;
            overflow: hidden;
            width: 80px;
            height: 80px;
        }
        .mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            max-width: 200px;
            margin: 0 auto;
        }
        .mobile-btn {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 18px;
            backdrop-filter: blur(10px);
        }
        .mobile-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-6">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">俄罗斯方块</h1>
            <div class="flex justify-between items-center text-sm text-gray-600">
                <span>得分: <span id="score" class="font-bold">0</span></span>
                <span>等级: <span id="level" class="font-bold">1</span></span>
                <span>消除: <span id="lines" class="font-bold">0</span></span>
            </div>
        </div>

        <div class="flex justify-between items-start mb-6">
            <div>
                <h3 class="text-sm font-semibold text-gray-700 mb-2">下一个:</h3>
                <div id="next-piece" class="next-piece"></div>
            </div>
            <div id="game-board" class="game-board w-64 h-64"></div>
        </div>

        <div class="mb-6">
            <div class="flex justify-center space-x-4 mb-4">
                <button id="start-btn" class="control-btn bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-lg font-semibold shadow-lg">
                    <i class="fas fa-play mr-2"></i>开始
                </button>
                <button id="pause-btn" class="control-btn bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-2 rounded-lg font-semibold shadow-lg">
                    <i class="fas fa-pause mr-2"></i>暂停
                </button>
            </div>
        </div>

        <!-- 移动端控制按钮 -->
        <div class="mobile-controls">
            <div></div>
            <button id="rotate-btn" class="mobile-btn">
                <i class="fas fa-undo"></i>
            </button>
            <div></div>
            <button id="left-btn" class="mobile-btn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <button id="down-btn" class="mobile-btn">
                <i class="fas fa-arrow-down"></i>
            </button>
            <button id="right-btn" class="mobile-btn">
                <i class="fas fa-arrow-right"></i>
            </button>
        </div>

        <div class="mt-6 text-center text-xs text-gray-500">
            <p>使用方向键或屏幕按钮控制</p>
            <p class="mt-1">↑ 旋转 | ← → 移动 | ↓ 加速下降</p>
        </div>
    </div>

    <script>
        class TetrisGame {
            constructor() {
                this.boardWidth = 10;
                this.boardHeight = 20;
                this.board = [];
                this.currentPiece = null;
                this.nextPiece = null;
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.gameInterval = null;
                this.isPaused = false;
                this.isGameOver = false;
                
                this.pieces = [
                    { shape: [[1, 1, 1, 1]], color: 'i' }, // I
                    { shape: [[1, 0, 0], [1, 1, 1]], color: 'j' }, // J
                    { shape: [[0, 0, 1], [1, 1, 1]], color: 'l' }, // L
                    { shape: [[1, 1], [1, 1]], color: 'o' }, // O
                    { shape: [[0, 1, 1], [1, 1, 0]], color: 's' }, // S
                    { shape: [[0, 1, 0], [1, 1, 1]], color: 't' }, // T
                    { shape: [[1, 1, 0], [0, 1, 1]], color: 'z' }  // Z
                ];
                
                this.init();
                this.bindEvents();
            }
            
            init() {
                this.createBoard();
                this.renderBoard();
                this.generatePiece();
                this.renderNextPiece();
            }
            
            createBoard() {
                this.board = [];
                for (let y = 0; y < this.boardHeight; y++) {
                    this.board[y] = [];
                    for (let x = 0; x < this.boardWidth; x++) {
                        this.board[y][x] = 0;
                    }
                }
            }
            
            renderBoard() {
                const boardElement = document.getElementById('game-board');
                boardElement.innerHTML = '';
                
                for (let y = 0; y < this.boardHeight; y++) {
                    for (let x = 0; x < this.boardWidth; x++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        if (this.board[y][x]) {
                            cell.classList.add('filled', this.board[y][x]);
                        }
                        boardElement.appendChild(cell);
                    }
                }
                
                // Render current piece
                if (this.currentPiece) {
                    const { shape, x, y, color } = this.currentPiece;
                    for (let py = 0; py < shape.length; py++) {
                        for (let px = 0; px < shape[py].length; px++) {
                            if (shape[py][px]) {
                                const boardX = x + px;
                                const boardY = y + py;
                                if (boardY >= 0 && boardY < this.boardHeight && 
                                    boardX >= 0 && boardX < this.boardWidth) {
                                    const index = boardY * this.boardWidth + boardX;
                                    const cell = boardElement.children[index];
                                    cell.classList.add('filled', color);
                                }
                            }
                        }
                    }
                }
            }
            
            renderNextPiece() {
                const nextPieceElement = document.getElementById('next-piece');
                nextPieceElement.innerHTML = '';
                
                if (this.nextPiece) {
                    const { shape, color } = this.nextPiece;
                    for (let y = 0; y < 4; y++) {
                        for (let x = 0; x < 4; x++) {
                            const cell = document.createElement('div');
                            cell.className = 'cell';
                            if (y < shape.length && x < shape[y].length && shape[y][x]) {
                                cell.classList.add('filled', color);
                            }
                            nextPieceElement.appendChild(cell);
                        }
                    }
                }
            }
            
            generatePiece() {
                if (this.nextPiece) {
                    this.currentPiece = this.nextPiece;
                } else {
                    const pieceType = this.pieces[Math.floor(Math.random() * this.pieces.length)];
                    this.currentPiece = {
                        shape: pieceType.shape,
                        color: pieceType.color,
                        x: Math.floor(this.boardWidth / 2) - Math.floor(pieceType.shape[0].length / 2),
                        y: 0
                    };
                }
                
                const pieceType = this.pieces[Math.floor(Math.random() * this.pieces.length)];
                this.nextPiece = {
                    shape: pieceType.shape,
                    color: pieceType.color
                };
                
                this.renderNextPiece();
                
                // Check game over
                if (this.checkCollision()) {
                    this.gameOver();
                }
            }
            
            movePiece(dx, dy) {
                if (this.isPaused || this.isGameOver) return;
                
                this.currentPiece.x += dx;
                this.currentPiece.y += dy;
                
                if (this.checkCollision()) {
                    this.currentPiece.x -= dx;
                    this.currentPiece.y -= dy;
                    
                    if (dy > 0) {
                        this.lockPiece();
                        this.clearLines();
                        this.generatePiece();
                    }
                }
                
                this.renderBoard();
            }
            
            rotatePiece() {
                if (this.isPaused || this.isGameOver) return;
                
                const originalShape = this.currentPiece.shape;
                const rows = originalShape.length;
                const cols = originalShape[0].length;
                
                // Create rotated shape
                const rotated = [];
                for (let x = 0; x < cols; x++) {
                    rotated[x] = [];
                    for (let y = 0; y < rows; y++) {
                        rotated[x][y] = originalShape[rows - 1 - y][x];
                    }
                }
                
                const originalShapeCopy = this.currentPiece.shape;
                this.currentPiece.shape = rotated;
                
                if (this.checkCollision()) {
                    this.currentPiece.shape = originalShapeCopy;
                }
                
                this.renderBoard();
            }
            
            checkCollision() {
                const { shape, x, y } = this.currentPiece;
                
                for (let py = 0; py < shape.length; py++) {
                    for (let px = 0; px < shape[py].length; px++) {
                        if (shape[py][px]) {
                            const boardX = x + px;
                            const boardY = y + py;
                            
                            if (boardX < 0 || boardX >= this.boardWidth || 
                                boardY >= this.boardHeight ||
                                (boardY >= 0 && this.board[boardY][boardX])) {
                                return true;
                            }
                        }
                    }
                }
                
                return false;
            }
            
            lockPiece() {
                const { shape, x, y, color } = this.currentPiece;
                
                for (let py = 0; py < shape.length; py++) {
                    for (let px = 0; px < shape[py].length; px++) {
                        if (shape[py][px]) {
                            const boardX = x + px;
                            const boardY = y + py;
                            if (boardY >= 0) {
                                this.board[boardY][boardX] = color;
                            }
                        }
                    }
                }
            }
            
            clearLines() {
                let linesCleared = 0;
                
                for (let y = this.boardHeight - 1; y >= 0; y--) {
                    if (this.board[y].every(cell => cell !== 0)) {
                        this.board.splice(y, 1);
                        this.board.unshift(Array(this.boardWidth).fill(0));
                        linesCleared++;
                        y++; // Recheck same row index
                    }
                }
                
                if (linesCleared > 0) {
                    this.lines += linesCleared;
                    this.score += [0, 100, 300, 500, 800][linesCleared] * this.level;
                    this.level = Math.floor(this.lines / 10) + 1;
                    
                    document.getElementById('score').textContent = this.score;
                    document.getElementById('level').textContent = this.level;
                    document.getElementById('lines').textContent = this.lines;
                }
            }
            
            dropPiece() {
                if (this.isPaused || this.isGameOver) return;
                this.movePiece(0, 1);
            }
            
            start() {
                if (this.isGameOver) {
                    this.reset();
                }
                
                if (!this.gameInterval) {
                    this.gameInterval = setInterval(() => {
                        this.dropPiece();
                    }, Math.max(50, 1000 - (this.level - 1) * 100));
                }
                
                this.isPaused = false;
                document.getElementById('start-btn').disabled = true;
                document.getElementById('pause-btn').disabled = false;
            }
            
            pause() {
                if (this.gameInterval) {
                    clearInterval(this.gameInterval);
                    this.gameInterval = null;
                }
                this.isPaused = true;
                document.getElementById('start-btn').disabled = false;
                document.getElementById('pause-btn').disabled = true;
            }
            
            reset() {
                if (this.gameInterval) {
                    clearInterval(this.this.gameInterval);
                }
                this.createBoard();
                this.score = 0;
                this.level = 1;
                this.lines = 0;
                this.isPaused = false;
                this.isGameOver = false;
                this.gameInterval = null;
                
                document.getElementById('score').textContent = '0';
                document.getElementById('level').textContent = '1';
                document.getElementById('lines').textContent = '0';
                
                document.getElementById('start-btn').disabled = false;
                document.getElementById('pause-btn').disabled = true;
                
                this.generatePiece();
                this.renderBoard();
            }
            
            gameOver() {
                this.pause();
                this.isGameOver = true;
                alert(`游戏结束!\n最终得分: ${this.score}\n等级: ${this.level}\n消除行数: ${this.lines}`);
            }
            
            bindEvents() {
                // 键盘控制
                document.addEventListener('keydown', (e) => {
                    switch(e.key) {
                        case 'ArrowLeft':
                            this.movePiece(-1, 0);
                            break;
                        case 'ArrowRight':
                            this.movePiece(1, 0);
                            break;
                        case 'ArrowDown':
                            this.movePiece(0, 1);
                            break;
                        case 'ArrowUp':
                            this.rotatePiece();
                            break;
                        case ' ':
                            e.preventDefault();
                            this.dropPiece();
                            break;
                    }
                });
                
                // 按钮控制
                document.getElementById('start-btn').addEventListener('click', () => this.start());
                document.getElementById('pause-btn').addEventListener('click', () => this.pause());
                document.getElementById('left-btn').addEventListener('click', () => this.movePiece(-1, 0));
                document.getElementById('right-btn').addEventListener('click', () => this.movePiece(1, 0));
                document.getElementById('down-btn').addEventListener('click', () => this.movePiece(0, 1));
                document.getElementById('rotate-btn').addEventListener('click', () => this.rotatePiece());
            }
        }
        
        // 初始化游戏
        document.addEventListener('DOMContentLoaded', () => {
            new TetrisGame();
        });
    </script>
</body>
</html>
